name: pkgcheck

# This will cancel running jobs once a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

on:
  # Manually trigger the Action under Actions/pkgcheck
  workflow_dispatch:
  # Run on every push to main/master branches
  push:
    branches:
      - main
      - master
  # Crucial: Run on pull requests so errors are caught before merging
  pull_request:
    branches:
      - main
      - master

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      # 1. You MUST check out your repository code so GitHub Actions can see your package
      - uses: actions/checkout@v4

      # 2. Set up R properly on the virtual machine
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # 3. Automatically discover and install graphics, grDevices, and roxygen2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::roxygen2

      # 4. Run the official ropensci package check tool
      - uses: ropensci-review-tools/pkgcheck-action@main